<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>History — TruthLens</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .history-page { padding: 50px 0 80px; }

    .history-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 36px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 7px 16px;
      border-radius: 50px;
      border: 1.5px solid var(--light-gray);
      background: rgba(255,255,255,0.7);
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-soft);
      cursor: pointer;
      transition: var(--transition);
      font-family: var(--font-body);
    }

    .filter-btn:hover { border-color: var(--coral-lt); color: var(--coral); }

    .filter-btn.active {
      background: linear-gradient(135deg, rgba(255,77,109,0.12), rgba(255,107,53,0.06));
      border-color: rgba(255,77,109,0.3);
      color: var(--coral);
    }

    /* History list */
    #history-list { min-height: 200px; }

    .history-card-wrap {
      animation: fadeUp 0.4s cubic-bezier(0.23,1,0.32,1) both;
    }

    .history-card-wrap:nth-child(1) { animation-delay: 0.05s; }
    .history-card-wrap:nth-child(2) { animation-delay: 0.10s; }
    .history-card-wrap:nth-child(3) { animation-delay: 0.15s; }
    .history-card-wrap:nth-child(4) { animation-delay: 0.20s; }
    .history-card-wrap:nth-child(5) { animation-delay: 0.25s; }

    .hc-left { display: flex; align-items: center; gap: 14px; min-width: 0; }

    .hc-num {
      font-family: var(--font-display);
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--mid-gray);
      width: 22px;
      flex-shrink: 0;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 72px 20px;
    }

    .empty-icon { font-size: 56px; margin-bottom: 18px; }

    /* Stats mini bar */
    .mini-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 28px;
    }

    .mini-stat-card {
      padding: 18px 20px;
      text-align: center;
    }

    .mini-stat-num {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 800;
      display: block;
    }

    .mini-stat-lbl {
      font-size: 0.78rem;
      color: var(--text-soft);
      margin-top: 2px;
    }

    /* Shimmer rows */
    .shimmer-row {
      height: 64px;
      border-radius: var(--radius-sm);
      margin-bottom: 10px;
    }

    @media (max-width: 600px) {
      .mini-stats { grid-template-columns: 1fr 1fr 1fr; }
      .history-card { flex-wrap: wrap; }
      .history-date { display: none; }
    }
  </style>
</head>
<body>
  <div class="noise-layer"></div>

  <div class="page-wrapper">
    <nav>
      <div class="nav-inner">
        <a href="index.html" class="nav-logo">
          <div class="logo-icon">🛡</div>
          <span>Truth<span style="color:var(--coral)">Lens</span></span>
        </a>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="analyze.html">Analyze</a></li>
          <li><a href="history.html" class="active">History</a></li>
        </ul>
      </div>
    </nav>

    <div class="history-page">
      <div class="container">

        <!-- Header -->
        <div class="history-header page-enter">
          <div>
            <div class="section-label">Past Analyses</div>
            <h1 class="section-title">Analysis <span>History</span></h1>
          </div>

          <div class="filter-row">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="Fake">🚨 Fake</button>
            <button class="filter-btn" data-filter="Real">✅ Real</button>
            <button class="filter-btn" data-filter="Uncertain">⚠️ Uncertain</button>
          </div>
        </div>

        <!-- Mini stats -->
        <div class="mini-stats page-enter">
          <div class="card mini-stat-card">
            <span class="mini-stat-num" id="total-count" style="color:var(--coral);">—</span>
            <div class="mini-stat-lbl">Total</div>
          </div>
          <div class="card mini-stat-card">
            <span class="mini-stat-num" id="fake-count" style="color:var(--coral);">—</span>
            <div class="mini-stat-lbl">Fake</div>
          </div>
          <div class="card mini-stat-card">
            <span class="mini-stat-num" id="real-count" style="color:var(--teal);">—</span>
            <div class="mini-stat-lbl">Real</div>
          </div>
        </div>

        <!-- History list -->
        <div id="history-list">
          <!-- Shimmer loading -->
          <div class="shimmer-row loading-shimmer"></div>
          <div class="shimmer-row loading-shimmer" style="opacity:0.7;"></div>
          <div class="shimmer-row loading-shimmer" style="opacity:0.5;"></div>
        </div>

      </div>
    </div>

    <footer>
      Built with ❤️ for <span>OceanLab × CHARUSAT Hacks 2026</span> · TruthLens
    </footer>
  </div>

  <script src="history.js"></script>
</body>
</html>
